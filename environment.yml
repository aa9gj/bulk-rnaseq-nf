# Conda environment for bulk-rnaseq-nf pipeline
# Install with: conda env create -f environment.yml
# Activate with: conda activate bulk-rnaseq

name: bulk-rnaseq
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core tools
  - python>=3.8
  - nextflow>=21.10.0

  # Quality control
  - fastqc>=0.11.9
  - multiqc>=1.12
  - trim-galore>=0.6.7

  # Alignment
  - hisat2>=2.2.1
  - samtools>=1.15

  # Transcript assembly and quantification
  - stringtie>=2.2.1

  # Python dependencies for prepDE.py
  - pandas>=1.3.0
  - numpy>=1.21.0

  # Utility tools
  - pigz>=2.6
